- name: "Phase 2: Extract Postilion Installer"
  hosts: postilion_servers
  gather_facts: true
  tags:
    - extract

  tasks:
    - name: Import extraction tasks from role
      ansible.builtin.include_role:
        name: postilion_realtime
        tasks_from: extract
