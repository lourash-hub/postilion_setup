---
# =============================================================================
# Phase 3: Install Postilion Realtime via AutoIt GUI Automation
# Launches setup.exe in background, then runs compiled AutoIt script
# =============================================================================

- name: Check if Postilion is already installed
  ansible.windows.win_stat:
    path: "{{ postilion_realtime_dir }}\\bin"
  register: postilion_bin_check
  tags:
    - install

- name: Skip installation if already installed
  ansible.builtin.debug:
    msg: "Postilion Realtime is already installed at {{ postilion_realtime_dir }}. Skipping installation."
  when: postilion_bin_check.stat.exists
  tags:
    - install

# --- Generate AutoIt script from template ---
- name: Generate AutoIt script from Jinja2 template
  ansible.windows.win_template:
    src: postilion_install.au3.j2
    dest: "{{ temp_dir }}\\postilion_install.au3"
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Copy AutoIt3 interpreter OR compiled script ---
# Prefer AutoIt3.exe + template .au3 so Ansible variables are used.
# Fall back to compiled .exe if AutoIt3.exe is not available.
- name: Check if AutoIt3.exe interpreter is available
  ansible.builtin.stat:
    path: "{{ role_path }}/files/AutoIt3.exe"
  delegate_to: localhost
  register: autoit_interpreter_check
  when: not postilion_bin_check.stat.exists
  tags:
    - install

- name: Copy AutoIt3 interpreter to target
  ansible.windows.win_copy:
    src: AutoIt3.exe
    dest: "{{ temp_dir }}\\AutoIt3.exe"
  when:
    - not postilion_bin_check.stat.exists
    - autoit_interpreter_check.stat.exists | default(false)
  tags:
    - install

- name: Copy compiled AutoIt script to target (fallback)
  ansible.windows.win_copy:
    src: postilion_install.exe
    dest: "{{ autoit_script_dest }}"
  when:
    - not postilion_bin_check.stat.exists
    - not (autoit_interpreter_check.stat.exists | default(false))
  tags:
    - install

- name: Set AutoIt execution method fact
  ansible.builtin.set_fact:
    autoit_use_interpreter: "{{ autoit_interpreter_check.stat.exists | default(false) }}"
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Clear any previous install log ---
- name: Remove previous AutoIt install log
  ansible.windows.win_file:
    path: "{{ autoit_log_file }}"
    state: absent
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# =============================================================================
# IMPORTANT: WinRM runs in Session 0 (non-interactive). GUI apps launched via
# WinRM have no visible desktop, so both the installer and AutoIt must be
# launched in the interactive user session using a scheduled task.
# =============================================================================

# --- Create log directory ---
- name: Ensure log directory exists
  ansible.windows.win_file:
    path: "{{ log_dir }}"
    state: directory
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Launch installer + AutoIt together via scheduled task ---
- name: Create launcher script that starts installer then AutoIt
  ansible.windows.win_copy:
    content: |
      # Postilion interactive installer launcher
      # Runs in the interactive desktop session via scheduled task
      $logFile = "{{ autoit_log_file }}"
      $ErrorActionPreference = "Continue"

      # Start the installer GUI
      $installer = Start-Process -FilePath "{{ postilion_setup_exe }}" -PassThru
      Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] Installer started PID=$($installer.Id)"

      # Wait for the installer window to appear (up to 120 seconds)
      $timeout = 120
      $elapsed = 0
      $windowFound = $false
      while ($elapsed -lt $timeout) {
          Start-Sleep -Seconds 3
          $elapsed += 3
          # Check for the window — must match the exact installer title, not Notepad etc.
          $procs = Get-Process | Where-Object {
              $_.MainWindowTitle -eq "Realtime Install Framework"
          }
          if (-not $procs) {
              # Fallback: substring match but exclude Notepad/other apps
              $procs = Get-Process | Where-Object {
                  $_.MainWindowTitle -like "*Realtime Install*" -and
                  $_.ProcessName -ne "notepad" -and
                  $_.ProcessName -ne "notepad++"
              }
          }
          if ($procs) {
              $windowFound = $true
              Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] Installer window detected: $($procs[0].MainWindowTitle) (PID=$($procs[0].Id)) after ${elapsed}s"
              break
          }
      }

      if (-not $windowFound) {
          Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] WARNING: Window not detected after ${timeout}s, proceeding with AutoIt anyway"
      }

      # Small delay to let the window fully render
      Start-Sleep -Seconds 5

      # Launch AutoIt automation
      # Use interpreter + template .au3 if available, otherwise compiled .exe
      {% if autoit_use_interpreter | default(false) %}
      $autoitExe = "{{ temp_dir }}\AutoIt3.exe"
      $autoitArg = "{{ temp_dir }}\postilion_install.au3"
      Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] Starting AutoIt: $autoitExe $autoitArg"
      $autoit = Start-Process -FilePath $autoitExe -ArgumentList $autoitArg -Wait -PassThru
      {% else %}
      Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] Starting AutoIt script: {{ autoit_script_dest }}"
      $autoit = Start-Process -FilePath "{{ autoit_script_dest }}" -Wait -PassThru
      {% endif %}
      Add-Content -Path $logFile -Value "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') [LAUNCHER] AutoIt finished with exit code: $($autoit.ExitCode)"

      # Write exit code to a marker file for Ansible to read
      $autoit.ExitCode | Out-File -FilePath "{{ temp_dir }}\autoit_exitcode.txt" -NoNewline
    dest: "{{ temp_dir }}\\postilion_launcher.ps1"
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Create and run scheduled task in interactive session ---
- name: Create scheduled task to run installer in interactive session
  ansible.windows.win_shell: |
    # Remove any previous task
    Unregister-ScheduledTask -TaskName "PostilionInstall" -Confirm:$false -ErrorAction SilentlyContinue

    # Create task action — run PowerShell with the launcher script
    $action = New-ScheduledTaskAction -Execute "powershell.exe" `
      -Argument "-NoProfile -ExecutionPolicy Bypass -File {{ temp_dir }}\postilion_launcher.ps1"

    # Run as the logged-in user with highest privileges (interactive session)
    $principal = New-ScheduledTaskPrincipal -UserId "{{ ansible_user }}" `
      -LogonType Interactive -RunLevel Highest

    # Register the task
    Register-ScheduledTask -TaskName "PostilionInstall" -Action $action -Principal $principal -Force

    # Start it immediately
    Start-ScheduledTask -TaskName "PostilionInstall"
    Write-Output "Scheduled task started"
  when: not postilion_bin_check.stat.exists
  tags:
    - install

- name: Display installer launch status
  ansible.builtin.debug:
    msg: "Postilion installer launched via scheduled task in interactive desktop session"
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Wait for the scheduled task to complete ---
- name: Wait for installation to complete (scheduled task)
  ansible.windows.win_shell: |
    $timeout = {{ postilion_install_timeout }}
    $elapsed = 0
    while ($elapsed -lt $timeout) {
        $task = Get-ScheduledTask -TaskName "PostilionInstall" -ErrorAction SilentlyContinue
        if ($task -and $task.State -eq "Ready") {
            # Task completed — check the result
            $info = Get-ScheduledTaskInfo -TaskName "PostilionInstall"
            Write-Output "Task completed. Last result: $($info.LastTaskResult)"

            # Read AutoIt exit code if available
            $exitFile = "{{ temp_dir }}\autoit_exitcode.txt"
            if (Test-Path $exitFile) {
                $exitCode = Get-Content $exitFile -Raw
                Write-Output "AutoIt exit code: $exitCode"
                if ($exitCode.Trim() -eq "0") {
                    exit 0
                } else {
                    exit [int]$exitCode.Trim()
                }
            }
            exit 0
        }
        Start-Sleep -Seconds 10
        $elapsed += 10

        # Progress logging every 60 seconds
        if ($elapsed % 60 -eq 0) {
            Write-Output "Still waiting... ${elapsed}s elapsed (task state: $($task.State))"
        }
    }
    Write-Output "Timeout after ${timeout}s waiting for scheduled task"
    exit 1
  register: autoit_result
  timeout: "{{ postilion_install_timeout + 60 }}"
  failed_when: autoit_result.rc != 0
  when: not postilion_bin_check.stat.exists
  tags:
    - install

# --- Clean up the scheduled task ---
- name: Remove PostilionInstall scheduled task
  ansible.windows.win_shell: |
    Unregister-ScheduledTask -TaskName "PostilionInstall" -Confirm:$false -ErrorAction SilentlyContinue
  when: not postilion_bin_check.stat.exists
  tags:
    - install

- name: Display AutoIt exit code
  ansible.builtin.debug:
    msg: "AutoIt script completed with exit code: {{ autoit_result.rc }}"
  when:
    - not postilion_bin_check.stat.exists
    - autoit_result is defined
  tags:
    - install

# --- Retrieve AutoIt log for troubleshooting ---
- name: Read AutoIt installation log
  ansible.windows.win_shell: |
    if (Test-Path "{{ autoit_log_file }}") {
        Get-Content "{{ autoit_log_file }}" -Tail 50
    } else {
        Write-Output "No AutoIt log file found"
    }
  register: autoit_log
  when: not postilion_bin_check.stat.exists
  tags:
    - install

- name: Display AutoIt log output
  ansible.builtin.debug:
    msg: "{{ autoit_log.stdout_lines }}"
  when:
    - not postilion_bin_check.stat.exists
    - autoit_log is defined
    - autoit_log.stdout_lines | length > 0
  tags:
    - install

# --- Cleanup ---
- name: Clean up AutoIt script from target
  ansible.windows.win_file:
    path: "{{ autoit_script_dest }}"
    state: absent
  when:
    - not postilion_bin_check.stat.exists
    - cleanup_autoit_script | bool
  notify: "cleanup autoit"
  tags:
    - install

- name: Clean up generated AutoIt source
  ansible.windows.win_file:
    path: "{{ temp_dir }}\\postilion_install.au3"
    state: absent
  when:
    - not postilion_bin_check.stat.exists
    - cleanup_autoit_script | bool
  tags:
    - install

- name: Clean up AutoIt3 interpreter
  ansible.windows.win_file:
    path: "{{ temp_dir }}\\AutoIt3.exe"
    state: absent
  when:
    - not postilion_bin_check.stat.exists
    - cleanup_autoit_script | bool
  tags:
    - install

- name: Clean up launcher script and exit code marker
  ansible.windows.win_shell: |
    Remove-Item -Path "{{ temp_dir }}\postilion_launcher.ps1" -Force -ErrorAction SilentlyContinue
    Remove-Item -Path "{{ temp_dir }}\autoit_exitcode.txt" -Force -ErrorAction SilentlyContinue
  when:
    - not postilion_bin_check.stat.exists
    - cleanup_autoit_script | bool
  tags:
    - install

- name: Installation phase complete
  ansible.builtin.debug:
    msg: "Postilion Realtime installation phase completed"
  tags:
    - install
